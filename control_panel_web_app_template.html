<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Control Panel Study</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background-color: #ccc; }
    .container { display: flex; height: 100vh; }

    .instructions {
      width: 33%; background-color: black; color: #00ff00; padding: 20px;
      box-sizing: border-box; display: flex; flex-direction: column;
      justify-content: center; align-items: center; text-align: center;
    }

    .state-list { margin-top: 20px; font-size: 22px; line-height: 2; width: 100%; }

    .controls {
      width: 67%; background-color: #888; display: flex;
      justify-content: center; align-items: center;
    }

    .grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(2, 1fr); gap: 20px; width: 80%;
    }

    .button-container { text-align: center; }
    .label { margin-bottom: 5px; font-weight: bold; }

    button {
      width: 100%; aspect-ratio: 1 / 1; font-size: 16px;
      background-color: lightgray; border: 2px solid black;
      cursor: pointer; transition: background-color 0.15s ease;
    }

    button.flash { background-color: #bbb; }

    .start-button {
      width: 400px; padding: 10px 0; font-weight: bold;
      font-size: 18px; text-align: center; background-color: lightgray;
      border: 2px solid black; cursor: pointer; height: 50px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="instructions">
    <h2>Instructions</h2>
    <p id="taskText" style="display:none;"></p>
    <button id="startButton" class="start-button" onclick="startTask()">Start Task</button>
    <p id="timer" style="display:none;">Time: 0.000 s</p>
    <div class="state-list" id="stateList"></div>
  </div>

  <div class="controls">
    <div class="grid" id="grid"></div>
  </div>
</div>

<script>
  const grid = document.getElementById("grid");
  const stateList = document.getElementById("stateList");
  const taskText = document.getElementById("taskText");
  const timerEl = document.getElementById("timer");
  const startButton = document.getElementById("startButton");

  let state = [];
  let startTime = null;
  let timerInterval;
  let currentTask = 0;
  let results = []; // store completion times

  const numericLabels = ["1","2","3","4","5","6","7","8"];
  const systemLabels = ["Engine","Oxygen","Fuel","Airlock","Life Support","Comms","Battery","Lights"];

  let currentLabels = numericLabels;

  const tasks = [
    {
      text: "Turn on ONLY buttons 1, 3, and 5",
      target: [true,false,true,false,true,false,false,false],
      initialState: [false,false,false,false,false,false,false,false],
      displayOrder: [0,1,2,3,4,5,6,7],
      labels: numericLabels
    },
    {
      text: "Turn on ONLY buttons 2, 4, 6",
      target: [false,true,false,true,false,true,false,false],
      initialState: [true,false,true,false,false,false,false,false],
      displayOrder: [3,2,1,0,7,6,5,4],
      labels: numericLabels
    },
    {
      text: "Turn on ONLY Engine, Fuel, and Life Support",
      target: [true,false,true,false,true,false,false,false],
      initialState: [false,false,false,false,false,false,false,false],
      displayOrder: [0,1,2,3,4,5,6,7],
      labels: systemLabels
    },
    {
      text: "Turn on ONLY Oxygen, Airlock, and Comms",
      target: [false,true,false,true,false,true,false,false],
      initialState: [true,false,true,false,false,false,false,false],
      displayOrder: [2,3,0,1,6,7,4,5],
      labels: systemLabels
    }
  ];

  const buttons = [];
  const labelEls = [];

  for (let i = 0; i < 8; i++) {
    const container = document.createElement("div");
    container.className = "button-container";

    const label = document.createElement("div");
    label.className = "label";

    const button = document.createElement("button");
    button.onclick = () => toggleButton(i, button);

    container.appendChild(label);
    container.appendChild(button);
    grid.appendChild(container);

    buttons.push(button);
    labelEls.push(label);
  }

  function applyLabels(labels) {
    currentLabels = labels;
    labelEls.forEach((el, i) => el.innerText = labels[i]);
  }

  function toggleButton(index, button) {
    state[index] = !state[index];
    button.classList.add("flash");
    setTimeout(() => button.classList.remove("flash"), 150);
    updateStateDisplay();
    checkTask();
  }

  function updateStateDisplay() {
    let text = "<strong>Current State:</strong><br>";
    let order = tasks[currentTask]?.displayOrder || [0,1,2,3,4,5,6,7];

    order.forEach(i => {
      text += `${currentLabels[i]}: ${state[i] ? "ON" : "OFF"}<br>`;
    });

    stateList.innerHTML = text;
  }

  function startTask() {
    if (currentTask >= tasks.length) {
      return;
    }

    startButton.style.display = "none";

    const task = tasks[currentTask];

    applyLabels(task.labels);
    state = [...task.initialState];

    updateStateDisplay();
    taskText.innerText = task.text;
    taskText.style.display = "block";
    timerEl.style.display = "none";

    startTime = performance.now();
    timerInterval = setInterval(() => {
      const elapsed = (performance.now() - startTime) / 1000;
      timerEl.innerText = "Time: " + elapsed.toFixed(3) + " s";
    }, 50);
  }

  function checkTask() {
    if (!startTime) return;

    const complete = state.every((val, i) => val === tasks[currentTask].target[i]);

    if (complete) {
      clearInterval(timerInterval);
      const totalTime = (performance.now() - startTime) / 1000;
      results.push(totalTime);

      startTime = null;
      currentTask++;

      if (currentTask < tasks.length) {
        startButton.innerText = "Start Next Task";
        startButton.style.display = "block";
      } else {
        // Show summary at end
        let summary = "<strong>All Tasks Complete</strong><br><br>";
        results.forEach((t, i) => {
          summary += `Task ${i+1}: ${t.toFixed(3)} s<br>`;
        });

        
        

        taskText.innerHTML = summary;
        taskText.style.display = "block";
        startButton.style.display = "none";
      }
    }
  }

  applyLabels(numericLabels);
  state = Array(8).fill(false);
  updateStateDisplay();
</script>

</body>
</html>
